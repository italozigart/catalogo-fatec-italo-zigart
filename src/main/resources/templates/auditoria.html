<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Auditoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">← Voltar ao Catálogo</a>
    </div>
</nav>
<div class="container">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0"><i class="bi bi-clock-history me-2"></i>Painel de Auditoria</h2>
            <small>Produtos ordenados pela última modificação</small>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Preço (R$)</th>
                    <th>Estoque</th>
                    <th>Última Atualização</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}"
                    th:classappend="${p.quantidade < 5} ? 'table-warning' : ''">
                    <td th:text="${p.idProduto}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${p.categoria != null ? p.categoria.nome : 'Sem Categoria'}"></td>
                    <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td>
                        <span th:text="${p.quantidade}"
                              th:classappend="${p.quantidade < 5} ? 'badge bg-warning text-dark' : 'badge bg-success'">
                        </span>
                    </td>
                    <td th:text="${#temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm:ss')}"></td>
                </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center">
                Nenhum produto cadastrado.
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
